name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint
      continue-on-error: true # Prevents CI from failing if there are minor lint warnings

    - name: Build Application
      run: npm run build
      env:
        # Provide dummy or real env variables required for the build step
        NEXTAUTH_SECRET: dummy-secret-for-build
        NEXTAUTH_URL: http://localhost:3000
